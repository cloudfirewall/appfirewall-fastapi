name: Publish to PyPI

# Publishes appfirewall-fastapi to PyPI when a GitHub Release is published.
# Uses PyPI trusted publishing (OIDC) — no API token secret required.
# One-time setup on PyPI: https://pypi.org/manage/account/publishing/
#   Owner: sireto   Repo: appfirewall-fastapi
#   Workflow: publish.yml   Environment: pypi

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  verify:
    name: Run checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs reads git tags to derive the version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest
        run: pytest

      - name: mypy
        run: mypy src/

      - name: ruff
        run: ruff check src/ tests/

  build:
    name: Build distribution
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs reads git tags to derive the version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/appfirewall-fastapi
    permissions:
      id-token: write  # required for trusted publishing
      contents: read

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
